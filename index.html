<!doctype html>
<html>
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="stylesheet" href="styles.css" />
		<title>Mesh Slicer with 3D Preview</title>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
	</head>
	<body>
		<div class="card">
			<h2>Mesh Slicer</h2>
			<p class="subtitle">
				Load an STL or 3MF file, preview in 3D, set your material
				thickness, and download per-slice SVGs.
			</p>

			<div
				class="drop-zone"
				id="drop-zone"
				onclick="document.getElementById('file-input').click()"
			>
				<div style="font-size: 40px; margin-bottom: 10px">📦</div>
				<div>Drop STL or 3MF here, or click to browse</div>
				<div style="font-size: 12px; color: #999; margin-top: 5px">
					Binary or ASCII STL · 3MF (ZIP-based)
				</div>
			</div>
			<input type="file" id="file-input" accept=".stl,.3mf" />
			<div id="status"></div>
			<div class="progress-bar" id="progress-bar">
				<div class="progress-fill" id="progress-fill"></div>
			</div>
		</div>

		<div id="viewer-wrap">
			<canvas id="canvas"></canvas>
			<div class="viewer-hint">
				drag to rotate<br />
				scroll to zoom
			</div>
		</div>

		<div class="card">
			<h2>Slice Settings</h2>
			<div class="controls">
				<div class="field">
					<label>Material Thickness (mm)</label>
					<input
						type="number"
						id="thickness"
						value="18"
						min="0.1"
						max="200"
						step="0.1"
					/>
				</div>
				<div class="field">
					<label>Slice Axis</label>
					<select id="axis">
						<option value="z">Z (horizontal layers)</option>
						<option value="y">Y</option>
						<option value="x">X</option>
					</select>
				</div>
				<div class="field">
					<label>SVG Margin (mm)</label>
					<input
						type="number"
						id="margin"
						value="2"
						min="0"
						max="20"
						step="0.5"
					/>
				</div>
				<button
					class="btn-primary"
					id="slice-btn"
					onclick="runSlice()"
					disabled
				>
					Slice
				</button>
			</div>
		</div>

		<div class="card hidden" id="results-card">
			<h2>Results</h2>
			<div class="stats" id="stats"></div>
			<div class="slice-grid" id="slice-grid"></div>
			<div class="button-row">
				<button class="btn-primary" onclick="downloadAll()">
					Download All SVGs
				</button>
				<button class="btn-secondary" onclick="downloadAll(true)">
					Download as ZIP
				</button>
			</div>
		</div>

		<script>
			// Global state
			let mesh = null;
			let slices = [];
			let gl,
				prog,
				meshBuf,
				vertexCount = 0,
				meshScale = 1.0;
			let rotX = -0.3,
				rotY = 0.5,
				zoom = 1.0;
			let dragging = false,
				lastX = 0,
				lastY = 0;

			// DOM elements
			const dropZone = document.getElementById("drop-zone");
			const fileInput = document.getElementById("file-input");
			const canvas = document.getElementById("canvas");
			const viewerWrap = document.getElementById("viewer-wrap");
			const sliceBtn = document.getElementById("slice-btn");
			const status = document.getElementById("status");
			const progressBar = document.getElementById("progress-bar");
			const progressFill = document.getElementById("progress-fill");

			// File handling
			dropZone.addEventListener("dragover", (e) => {
				e.preventDefault();
				dropZone.classList.add("over");
			});
			dropZone.addEventListener("dragleave", () =>
				dropZone.classList.remove("over"),
			);
			dropZone.addEventListener("drop", (e) => {
				e.preventDefault();
				dropZone.classList.remove("over");
				handleFile(e.dataTransfer.files[0]);
			});
			fileInput.addEventListener("change", () =>
				handleFile(fileInput.files[0]),
			);

			function setStatus(msg, progress) {
				status.textContent = msg;
				if (progress !== undefined) {
					progressBar.classList.add("active");
					progressFill.style.width = progress + "%";
				} else {
					progressBar.classList.remove("active");
				}
			}

			async function handleFile(file) {
				if (!file) return;
				const ext = file.name.split(".").pop().toLowerCase();
				setStatus("Loading file...", 10);

				try {
					const buf = await file.arrayBuffer();
					if (ext === "stl") {
						mesh = parseSTL(buf);
					} else if (ext === "3mf") {
						mesh = await parse3MF(buf);
					} else {
						setStatus("Unsupported file type. Use .stl or .3mf");
						return;
					}

					setStatus(
						`Loaded ${mesh.triangles.length.toLocaleString()} triangles from "${file.name}"`,
						100,
					);
					sliceBtn.disabled = false;
					dropZone.innerHTML = `<div style="font-size: 14px;">✓ ${file.name}</div>`;

					initViewer();
				} catch (e) {
					setStatus("Error: " + e.message);
					console.error(e);
				}
			}

			// STL parser
			function parseSTL(buf) {
				const view = new DataView(buf);
				const triangles = [];
				const count = view.getUint32(80, true);

				if (buf.byteLength >= 84 + count * 50 && count > 0) {
					// Binary STL
					for (let i = 0; i < count; i++) {
						const off = 84 + i * 50;
						triangles.push([
							[
								view.getFloat32(off + 12, true),
								view.getFloat32(off + 16, true),
								view.getFloat32(off + 20, true),
							],
							[
								view.getFloat32(off + 24, true),
								view.getFloat32(off + 28, true),
								view.getFloat32(off + 32, true),
							],
							[
								view.getFloat32(off + 36, true),
								view.getFloat32(off + 40, true),
								view.getFloat32(off + 44, true),
							],
						]);
					}
				} else {
					// ASCII STL
					const text = new TextDecoder().decode(buf);
					const re =
						/vertex\s+([\d.eE+\-]+)\s+([\d.eE+\-]+)\s+([\d.eE+\-]+)/g;
					let m,
						verts = [];
					while ((m = re.exec(text)) !== null) {
						verts.push([
							parseFloat(m[1]),
							parseFloat(m[2]),
							parseFloat(m[3]),
						]);
						if (verts.length === 3) {
							triangles.push([...verts]);
							verts = [];
						}
					}
				}

				return { triangles };
			}

			// 3MF parser
			async function parse3MF(buf) {
				const zip = await JSZip.loadAsync(buf);
				let modelXml = null;

				for (const [name, file] of Object.entries(zip.files)) {
					if (name.toLowerCase().endsWith(".model")) {
						modelXml = await file.async("string");
						break;
					}
				}

				if (!modelXml) throw new Error("No 3D model found in 3MF file");

				const doc = new DOMParser().parseFromString(
					modelXml,
					"text/xml",
				);
				const vertices = [];
				const triangles = [];

				// Use getElementsByTagName for namespace compatibility
				for (const v of doc.getElementsByTagName("vertex")) {
					vertices.push([
						parseFloat(v.getAttribute("x")),
						parseFloat(v.getAttribute("y")),
						parseFloat(v.getAttribute("z")),
					]);
				}

				for (const t of doc.getElementsByTagName("triangle")) {
					const a = parseInt(
						t.getAttribute("v1") || t.getAttribute("p1"),
					);
					const b = parseInt(
						t.getAttribute("v2") || t.getAttribute("p2"),
					);
					const c = parseInt(
						t.getAttribute("v3") || t.getAttribute("p3"),
					);
					if (!isNaN(a) && !isNaN(b) && !isNaN(c)) {
						triangles.push([vertices[a], vertices[b], vertices[c]]);
					}
				}

				return { triangles };
			}

			//
			// 3D VIEWER
			//

			let triBuf = null;
			let triCount = 0;

			let wireBuf = null;
			let wireCount = 0;

			function initViewer() {
				viewerWrap.classList.add("active");

				setTimeout(() => {
					gl = canvas.getContext("webgl", {
						antialias: true,
						alpha: false,
					});

					if (!gl) {
						setStatus("WebGL unavailable");
						return;
					}

					canvas.width = canvas.clientWidth;
					canvas.height = canvas.clientHeight;

					gl.viewport(0, 0, canvas.width, canvas.height);

					gl.disable(gl.CULL_FACE);

					gl.enable(gl.DEPTH_TEST);

					setupShaders();

					uploadMesh();

					setupControls();

					render();
				}, 50);
			}

			function setupShaders() {
				const vs = `
    attribute vec3 aPos;

    uniform float uRotX;
    uniform float uRotY;
    uniform float uZoom;

    void main() {

      vec3 p = aPos;

      //
      // USER ROTATION
      //

      float cy = cos(uRotY);
      float sy = sin(uRotY);

      p = vec3(
        p.x * cy + p.z * sy,
        p.y,
       -p.x * sy + p.z * cy
      );

      float cx = cos(uRotX);
      float sx = sin(uRotX);

      p = vec3(
        p.x,
        p.y * cx - p.z * sx,
        p.y * sx + p.z * cx
      );

      //
      // ISOMETRIC OFFSET
      //

      float ay = radians(45.0);
      float ax = radians(35.264);

      p = vec3(
        p.x * cos(ay) + p.z * sin(ay),
        p.y,
       -p.x * sin(ay) + p.z * cos(ay)
      );

      p = vec3(
        p.x,
        p.y * cos(ax) - p.z * sin(ax),
        p.y * sin(ax) + p.z * cos(ax)
      );

      //
      // SCALE
      //

      p *= uZoom;

      //
      // DEPTH FIX
      //

      gl_Position = vec4(
        p.xy,
        -p.z * 0.001,
        1.0
      );
    }
  `;

				const fs = `
    precision mediump float;

    uniform vec4 uColor;

    void main() {

      gl_FragColor = uColor;
    }
  `;

				const compile = (type, src) => {
					const s = gl.createShader(type);

					gl.shaderSource(s, src);

					gl.compileShader(s);

					return s;
				};

				prog = gl.createProgram();

				gl.attachShader(prog, compile(gl.VERTEX_SHADER, vs));

				gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fs));

				gl.linkProgram(prog);
			}

			function uploadMesh() {
				const tris = mesh.triangles;

				const triVerts = [];
				const wireVerts = [];

				let minX = Infinity;
				let minY = Infinity;
				let minZ = Infinity;

				let maxX = -Infinity;
				let maxY = -Infinity;
				let maxZ = -Infinity;

				for (const tri of tris) {
					for (const v of tri) {
						minX = Math.min(minX, v[0]);
						minY = Math.min(minY, v[1]);
						minZ = Math.min(minZ, v[2]);

						maxX = Math.max(maxX, v[0]);
						maxY = Math.max(maxY, v[1]);
						maxZ = Math.max(maxZ, v[2]);
					}
				}

				const cx = (minX + maxX) * 0.5;
				const cy = (minY + maxY) * 0.5;
				const cz = (minZ + maxZ) * 0.5;

				const size = Math.max(maxX - minX, maxY - minY, maxZ - minZ);

				meshScale = 1.5 / size;

				for (const tri of tris) {
					const v = tri.map((p) => [
						(p[0] - cx) * meshScale,
						(p[1] - cy) * meshScale,
						(p[2] - cz) * meshScale,
					]);

					//
					// TRIANGLES
					//

					triVerts.push(...v[0], ...v[1], ...v[2]);

					//
					// EDGES
					//

					wireVerts.push(
						...v[0],
						...v[1],
						...v[1],
						...v[2],
						...v[2],
						...v[0],
					);
				}

				//
				// TRI BUFFER
				//

				triBuf = gl.createBuffer();

				gl.bindBuffer(gl.ARRAY_BUFFER, triBuf);

				gl.bufferData(
					gl.ARRAY_BUFFER,
					new Float32Array(triVerts),
					gl.STATIC_DRAW,
				);

				triCount = triVerts.length / 3;

				//
				// WIRE BUFFER
				//

				wireBuf = gl.createBuffer();

				gl.bindBuffer(gl.ARRAY_BUFFER, wireBuf);

				gl.bufferData(
					gl.ARRAY_BUFFER,
					new Float32Array(wireVerts),
					gl.STATIC_DRAW,
				);

				wireCount = wireVerts.length / 3;
			}

			function setupControls() {
				canvas.addEventListener("mousedown", (e) => {
					dragging = true;

					lastX = e.clientX;
					lastY = e.clientY;
				});

				window.addEventListener("mouseup", () => {
					dragging = false;
				});

				window.addEventListener("mousemove", (e) => {
					if (!dragging) return;

					rotY += (e.clientX - lastX) * 0.01;

					rotX += (e.clientY - lastY) * 0.01;

					lastX = e.clientX;
					lastY = e.clientY;
				});

				canvas.addEventListener(
					"wheel",
					(e) => {
						e.preventDefault();

						zoom *= e.deltaY > 0 ? 0.9 : 1.1;

						zoom = Math.max(0.2, Math.min(10, zoom));
					},
					{ passive: false },
				);

				window.addEventListener("resize", () => {
					canvas.width = canvas.clientWidth;

					canvas.height = canvas.clientHeight;

					gl.viewport(0, 0, canvas.width, canvas.height);
				});
			}

			function render() {
				gl.clearColor(1, 1, 1, 1);

				gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

				if (triBuf) {
					gl.useProgram(prog);

					const posLoc = gl.getAttribLocation(prog, "aPos");

					const colorLoc = gl.getUniformLocation(prog, "uColor");

					gl.uniform1f(gl.getUniformLocation(prog, "uRotX"), rotX);

					gl.uniform1f(gl.getUniformLocation(prog, "uRotY"), rotY);

					gl.uniform1f(gl.getUniformLocation(prog, "uZoom"), zoom);

					//
					// SOLID PASS
					//

					gl.bindBuffer(gl.ARRAY_BUFFER, triBuf);

					gl.enableVertexAttribArray(posLoc);

					gl.vertexAttribPointer(posLoc, 3, gl.FLOAT, false, 0, 0);

					gl.uniform4f(colorLoc, 1, 1, 1, 1);

					gl.drawArrays(gl.TRIANGLES, 0, triCount);

					//
					// WIREFRAME PASS
					//

					gl.bindBuffer(gl.ARRAY_BUFFER, wireBuf);

					gl.vertexAttribPointer(posLoc, 3, gl.FLOAT, false, 0, 0);

					gl.uniform4f(colorLoc, 0, 0, 0, 1);

					gl.drawArrays(gl.LINES, 0, wireCount);
				}

				requestAnimationFrame(render);
			}

			// Slicer functions
			function getBounds(tris, axis) {
				const idx = axis === "x" ? 0 : axis === "y" ? 1 : 2;
				let mn = Infinity,
					mx = -Infinity;
				for (const tri of tris)
					for (const v of tri) {
						mn = Math.min(mn, v[idx]);
						mx = Math.max(mx, v[idx]);
					}
				return { mn, mx };
			}

			function sliceAtPlane(tris, t, axisIdx) {
				const a1 = (axisIdx + 1) % 3,
					a2 = (axisIdx + 2) % 3;
				const segs = [];

				for (const tri of tris) {
					const d = tri.map((v) => v[axisIdx] - t);
					const pts = [];

					for (let i = 0; i < 3; i++) {
						const j = (i + 1) % 3;
						if ((d[i] < 0 && d[j] > 0) || (d[i] > 0 && d[j] < 0)) {
							const f = d[i] / (d[i] - d[j]);
							pts.push([
								tri[i][a1] + f * (tri[j][a1] - tri[i][a1]),
								tri[i][a2] + f * (tri[j][a2] - tri[i][a2]),
							]);
						} else if (Math.abs(d[i]) < 1e-9) {
							pts.push([tri[i][a1], tri[i][a2]]);
						}
					}

					if (pts.length === 2) segs.push(pts);
				}

				return segs;
			}

			function segsToPolylines(segs) {
				if (!segs.length) return [];

				const eps = 1e-4;
				const used = new Uint8Array(segs.length);
				const polys = [];

				for (let s = 0; s < segs.length; s++) {
					if (used[s]) continue;
					used[s] = 1;
					const poly = [...segs[s]];
					let changed = true;

					while (changed) {
						changed = false;
						const tail = poly[poly.length - 1];

						for (let i = 0; i < segs.length; i++) {
							if (used[i]) continue;
							const [a, b] = segs[i];
							const da = Math.hypot(
								tail[0] - a[0],
								tail[1] - a[1],
							);
							const db = Math.hypot(
								tail[0] - b[0],
								tail[1] - b[1],
							);

							if (da < eps) {
								poly.push(b);
								used[i] = 1;
								changed = true;
								break;
							}
							if (db < eps) {
								poly.push(a);
								used[i] = 1;
								changed = true;
								break;
							}
						}
					}

					if (poly.length > 2) polys.push(poly);
				}

				return polys;
			}

			function polylinesToSVG(polys, margin) {
				if (!polys.length) return null;

				let mnX = Infinity,
					mnY = Infinity,
					mxX = -Infinity,
					mxY = -Infinity;
				for (const p of polys) {
					for (const [x, y] of p) {
						mnX = Math.min(mnX, x);
						mnY = Math.min(mnY, y);
						mxX = Math.max(mxX, x);
						mxY = Math.max(mxY, y);
					}
				}

				const W = mxX - mnX + margin * 2;
				const H = mxY - mnY + margin * 2;

				const paths = polys
					.map((p) => {
						const d =
							p
								.map(
									(pt, i) =>
										`${i ? "L" : "M"}${(pt[0] - mnX + margin).toFixed(3)},${(pt[1] - mnY + margin).toFixed(3)}`,
								)
								.join(" ") + " Z";
						return `<path d="${d}" fill="none" stroke="black" stroke-width="0.5"/>`;
					})
					.join("\n");

				return {
					svg: `<svg xmlns="http://www.w3.org/2000/svg" width="${W.toFixed(2)}mm" height="${H.toFixed(2)}mm" viewBox="0 0 ${W.toFixed(3)} ${H.toFixed(3)}">\n${paths}\n</svg>`,
				};
			}

			function runSlice() {
				if (!mesh) return;

				const thickness = parseFloat(
					document.getElementById("thickness").value,
				);
				const axisName = document.getElementById("axis").value;
				const margin = parseFloat(
					document.getElementById("margin").value,
				);
				const axisIdx = axisName === "x" ? 0 : axisName === "y" ? 1 : 2;
				const bounds = getBounds(mesh.triangles, axisName);
				const zMin = bounds.mn,
					zMax = bounds.mx;
				const numSlices = Math.ceil((zMax - zMin) / thickness);

				setStatus(`Slicing into ${numSlices} layers...`, 20);
				slices = [];
				document.getElementById("results-card").classList.add("hidden");
				document.getElementById("slice-grid").innerHTML = "";

				setTimeout(() => {
					for (let i = 0; i < numSlices; i++) {
						const z = zMin + (i + 0.5) * thickness;
						const segs = sliceAtPlane(mesh.triangles, z, axisIdx);
						const polys = segsToPolylines(segs);
						const result = polylinesToSVG(polys, margin);

						slices.push({
							idx: i,
							z: zMin + i * thickness,
							zEnd: Math.min(zMin + (i + 1) * thickness, zMax),
							svg: result ? result.svg : null,
						});

						progressFill.style.width =
							20 + (70 * (i + 1)) / numSlices + "%";
					}

					const nonEmpty = slices.filter((s) => s.svg);
					setStatus(
						`Done — ${nonEmpty.length} non-empty slices out of ${numSlices} total`,
						100,
					);
					renderResults(nonEmpty, thickness, axisName, zMin, zMax);
				}, 30);
			}

			function renderResults(nonEmpty, thickness, axisName, zMin, zMax) {
				const statsDiv = document.getElementById("stats");
				statsDiv.innerHTML = `
    <div class="stat">
      <div class="stat-label">Total Slices</div>
      <div class="stat-val">${nonEmpty.length}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Thickness</div>
      <div class="stat-val">${thickness}mm</div>
    </div>
    <div class="stat">
      <div class="stat-label">Model Span</div>
      <div class="stat-val">${(zMax - zMin).toFixed(1)}mm</div>
    </div>
    <div class="stat">
      <div class="stat-label">Triangles</div>
      <div class="stat-val">${mesh.triangles.length.toLocaleString()}</div>
    </div>
  `;

				const grid = document.getElementById("slice-grid");
				grid.innerHTML = "";

				nonEmpty.forEach((s, i) => {
					const card = document.createElement("div");
					card.className = "slice-card";
					card.title = `Slice ${i + 1} · ${axisName.toUpperCase()} ${s.z.toFixed(1)}–${s.zEnd.toFixed(1)}mm`;

					const preview = s.svg
						.replace(/stroke="black"/g, 'stroke="currentColor"')
						.replace(/width="[^"]*"/, 'width="100%"')
						.replace(/height="[^"]*"/, 'height="100px"');

					card.innerHTML = `${preview}<div class="slice-name">Layer ${i + 1} · ${s.z.toFixed(1)}mm</div>`;
					card.onclick = () => downloadSVG(s, i + 1);
					grid.appendChild(card);
				});

				document
					.getElementById("results-card")
					.classList.remove("hidden");
			}

			function sliceFilename(s, i) {
				return `slice_${String(i).padStart(3, "0")}_z${s.z.toFixed(1)}mm.svg`;
			}

			function downloadSVG(s, i) {
				if (!s.svg) return;
				const blob = new Blob([s.svg], { type: "image/svg+xml" });
				const a = document.createElement("a");
				a.href = URL.createObjectURL(blob);
				a.download = sliceFilename(s, i);
				a.click();
				URL.revokeObjectURL(a.href);
			}

			async function downloadAll(asZip) {
				const nonEmpty = slices.filter((s) => s.svg);
				if (!nonEmpty.length) return;

				if (!asZip) {
					nonEmpty.forEach((s, i) => downloadSVG(s, i + 1));
					return;
				}

				const zip = new JSZip();
				nonEmpty.forEach((s, i) =>
					zip.file(sliceFilename(s, i + 1), s.svg),
				);
				const blob = await zip.generateAsync({ type: "blob" });
				const a = document.createElement("a");
				a.href = URL.createObjectURL(blob);
				a.download = "slices.zip";
				a.click();
				URL.revokeObjectURL(a.href);
			}
		</script>
	</body>
</html>
